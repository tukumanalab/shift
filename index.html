<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト管理アプリ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>アルバイトシフト管理</h1>
            <div id="userInfo" class="user-info"></div>
        </header>

        <div id="loginSection" class="login-section">
            <h2>ログイン</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="メールアドレス" required>
                <input type="password" id="password" placeholder="パスワード" required>
                <button type="submit">ログイン</button>
            </form>
            <p>アカウントをお持ちでない方は <a href="#" id="showSignup">新規登録</a></p>
        </div>

        <div id="signupSection" class="signup-section" style="display: none;">
            <h2>新規登録</h2>
            <form id="signupForm">
                <input type="text" id="signupName" placeholder="名前" required>
                <input type="email" id="signupEmail" placeholder="メールアドレス" required>
                <input type="password" id="signupPassword" placeholder="パスワード" required>
                <button type="submit">登録</button>
            </form>
            <p>既にアカウントをお持ちの方は <a href="#" id="showLogin">ログイン</a></p>
        </div>

        <main id="mainContent" style="display: none;">
            <div class="tabs">
                <button class="tab-button active" data-tab="shifts">シフト一覧</button>
                <button class="tab-button" data-tab="request">シフト申請</button>
                <button class="tab-button" data-tab="manage" id="manageTabButton" style="display: none;">シフト管理</button>
                <button class="tab-button" data-tab="settings" id="settingsTabButton" style="display: none;">設定</button>
            </div>

            <div id="shiftsTab" class="tab-content active">
                <h2>シフト一覧</h2>
                <div id="shiftsList" class="shifts-list"></div>
            </div>

            <div id="requestTab" class="tab-content" style="display: none;">
                <h2>シフト申請</h2>
                <form id="shiftRequestForm">
                    <select id="requestDate" required>
                        <option value="">日付を選択してください</option>
                    </select>
                    <div class="time-slots">
                        <label>時間帯を選択（複数選択可）</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="timeSlot" value="13:00-14:00">
                                <span>13:00-14:00</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="timeSlot" value="14:00-15:00">
                                <span>14:00-15:00</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="timeSlot" value="15:00-16:00">
                                <span>15:00-16:00</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="timeSlot" value="16:00-17:00">
                                <span>16:00-17:00</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="timeSlot" value="17:00-18:00">
                                <span>17:00-18:00</span>
                            </label>
                        </div>
                    </div>
                    <textarea id="requestNote" placeholder="備考（任意）"></textarea>
                    <button type="submit">申請</button>
                </form>
                <div id="requestsList" class="requests-list">
                    <h3>申請済みシフト</h3>
                    <div id="requestsContent"></div>
                </div>
            </div>

            <div id="manageTab" class="tab-content" style="display: none;">
                <h2>シフト管理</h2>
                <div class="admin-section">
                    <h3>全ユーザーのシフト一覧</h3>
                    <div id="adminShiftsList" class="admin-shifts-list"></div>
                </div>
            </div>

            <div id="settingsTab" class="tab-content" style="display: none;">
                <h2>設定</h2>
                <div class="settings-section">
                    <h3>システム設定</h3>
                    <p>システムの各種設定を行えます。</p>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js?v=4"></script>
</body>
</html>
