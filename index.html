<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アルバイトシフト管理</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .login-container {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 30px;
            background-color: #f9f9f9;
        }
        .profile {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: white;
        }
        .profile img {
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .hidden {
            display: none;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .google-btn {
            background-color: #4285f4;
            color: white;
        }
        .logout-btn {
            background-color: #dc3545;
            color: white;
        }
        .shift-form {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: white;
            text-align: left;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        .submit-btn {
            background-color: #28a745;
            color: white;
            width: 100%;
        }
        .submit-btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .sync-btn {
            background-color: #17a2b8;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
        .sync-btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 0;
            margin: -50px auto 30px;
            max-width: 100vw;
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
        }
        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .navbar-user img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
        }
        .navbar-user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .navbar-user-name {
            font-size: 0.9rem;
            margin: 0;
        }
        .navbar-user-email {
            font-size: 0.7rem;
            color: #bdc3c7;
            margin: 0;
        }
        .navbar-logout {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .navbar-logout:hover {
            background-color: #c0392b;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-bottom: none;
            margin-right: 5px;
            transition: background-color 0.3s;
        }
        .tab:hover {
            background-color: #e0e0e0;
        }
        .tab.active {
            background-color: white;
            font-weight: bold;
            border-top: 3px solid #4285f4;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .shift-list {
            margin-top: 20px;
        }
        .shift-item {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }
        .shift-item-date {
            font-weight: bold;
            color: #2c3e50;
        }
        .shift-item-time {
            color: #666;
            margin: 5px 0;
        }
        .shift-item-content {
            color: #333;
        }
        .no-shifts {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbarSection">
        <div class="navbar-container">
            <a href="#" class="navbar-brand">アルバイトシフト管理</a>
            <div class="navbar-user" id="navbarUserSection" style="display: none;">
                <img id="navbarUserImage" src="" alt="ユーザー">
                <div class="navbar-user-info">
                    <p class="navbar-user-name" id="navbarUserName"></p>
                    <p class="navbar-user-email" id="navbarUserEmail"></p>
                </div>
                <button class="navbar-logout" onclick="signOut()">ログアウト</button>
            </div>
            <div id="navbarLoginSection">
                <div id="g_id_navbar_signin"></div>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div id="loginSection">
            <h2>ログインが必要です</h2>
            <p>右上のボタンからGoogleアカウントでログインしてください。</p>
        </div>

        <div id="profileSection" class="hidden">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('shift-list')">シフト一覧</div>
                <div class="tab" onclick="switchTab('shift-apply')">シフト申請</div>
            </div>
            
            <div id="shift-list" class="tab-content active">
                <div class="shift-list" id="shiftListContainer">
                    <div class="no-shifts">
                        <p>登録されたシフトはまだありません。</p>
                    </div>
                </div>
            </div>
            
            <div id="shift-apply" class="tab-content">
                <div class="shift-form">
                    <h3>シフト登録</h3>
                    <form id="shiftForm">
                    <div class="form-group">
                        <label for="shiftDate">日付:</label>
                        <input type="date" id="shiftDate" name="shiftDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="shiftTime">時間帯:</label>
                        <select id="shiftTime" name="shiftTime" required>
                            <option value="">選択してください</option>
                            <option value="早朝 (6:00-9:00)">早朝 (6:00-9:00)</option>
                            <option value="午前 (9:00-12:00)">午前 (9:00-12:00)</option>
                            <option value="午後 (12:00-15:00)">午後 (12:00-15:00)</option>
                            <option value="夕方 (15:00-18:00)">夕方 (15:00-18:00)</option>
                            <option value="夜間 (18:00-21:00)">夜間 (18:00-21:00)</option>
                            <option value="深夜 (21:00-24:00)">深夜 (21:00-24:00)</option>
                            <option value="終日 (9:00-18:00)">終日 (9:00-18:00)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="shiftContent">予定の内容:</label>
                        <textarea id="shiftContent" name="shiftContent" placeholder="作業内容や備考を入力してください" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">シフトを登録</button>
                </form>
                
                <button id="syncBtn" class="sync-btn" onclick="syncAllShiftsToCalendar()">
                    すべてのシフトをカレンダーに同期
                </button>
                </div>
            </div>
        </div>
    </div>

    <div id="g_id_onload"
         data-client_id=""
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
